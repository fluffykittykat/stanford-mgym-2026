<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2026 Stanford Men's Gymnastics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=0">
</head>
<body>
  <!-- Top Nav (desktop) -->
  <nav class="top-nav" id="topNav">
    <div class="nav-brand">
      <span class="brand-icon">🌲</span>
      <span class="brand-text">STANFORD GYMNASTICS</span>
    </div>
    <div class="nav-links">
      <a href="#" class="nav-link active" data-view="season">🏠 Season</a>
      <a href="#" class="nav-link" data-view="gymnasts">🤸 Gymnasts</a>
      <a href="#" class="nav-link" data-view="leaderboards">📊 Leaderboards</a>
      <a href="#" class="nav-link" data-view="insights">🔍 Insights</a>
    </div>
    <div class="nav-actions">
      <button class="refresh-btn" id="refreshBtn" title="Refresh data">
        <span class="refresh-icon">🔄</span>
        <span class="refresh-label">Refresh</span>
      </button>
    </div>
  </nav>

  <!-- Last updated bar (desktop) -->
  <div class="last-updated-bar" id="lastUpdatedBar" style="display:none;">
    <span id="lastUpdatedText">Last updated: just now</span>
  </div>

  <!-- Main Content -->
  <main id="app">
    <!-- Loading State -->
    <div id="loading" class="loading-container">
      <div class="spinner"></div>
      <p>Loading season data...</p>
    </div>

    <!-- Season Overview -->
    <section id="view-season" class="view" style="display:none;">
      <div id="missionControl" class="mission-control"></div>
      <div class="hero" style="display:none;">
        <div class="hero-record" id="seasonRecord"></div>
      </div>

      <!-- Score Trend Chart -->
      <div class="section-card">
        <h2 class="section-title">Season Score Trend</h2>
        <div class="chart-container" id="scoreTrend"></div>
      </div>

      <!-- Filters -->
      <div class="filter-bar">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="home">Home</button>
        <button class="filter-btn" data-filter="away">Away</button>
        <button class="filter-btn" data-filter="W">Wins</button>
        <button class="filter-btn" data-filter="L">Losses</button>
      </div>

      <!-- Meet Cards Grid -->
      <div class="meets-grid" id="meetsGrid"></div>
    </section>

    <!-- Meet Detail -->
    <section id="view-meet" class="view" style="display:none;">
      <button class="back-btn" id="backToSeason">← Back to Season</button>
      <div id="meetDetailContent"></div>
    </section>

    <!-- Gymnast Search & Profile -->
    <section id="view-gymnasts" class="view" style="display:none;">
      <div class="search-container">
        <input type="text" id="gymnastSearch" class="search-input" placeholder="Search gymnasts by name...">
      </div>
      <div class="gymnast-cards" id="gymnastCards"></div>
      <!-- Gymnast Detail (shown when clicked) -->
      <div id="gymnastDetail" style="display:none;"></div>
    </section>

    <!-- Event Leaderboards -->
    <section id="view-leaderboards" class="view" style="display:none;">
      <h2 class="section-title">📊 Rankings & Heat Map</h2>
      <div class="event-tabs" id="eventTabs">
        <button class="event-tab active" data-event="floor">Floor</button>
        <button class="event-tab" data-event="pommel">Pommel</button>
        <button class="event-tab" data-event="rings">Rings</button>
        <button class="event-tab" data-event="vault">Vault</button>
        <button class="event-tab" data-event="pbars">P-Bars</button>
        <button class="event-tab" data-event="hbar">High Bar</button>
        <button class="event-tab" data-event="aa">All-Around</button>
        <button class="event-tab" data-event="heatmap">🔥 Heat Map</button>
      </div>
      <div class="leaderboard-list" id="leaderboardList"></div>
    </section>

    <section id="view-insights" class="view" style="display:none;">
      <div id="mainContent"></div>
    </section>
  </main>

  <!-- Bottom Nav (mobile) -->
  <nav class="bottom-nav" id="bottomNav">
    <a href="#" class="bottom-nav-item active" data-view="season">
      <span class="nav-icon">⚡</span>
      <span class="nav-label">War Room</span>
    </a>
    <a href="#" class="bottom-nav-item" data-view="gymnasts">
      <span class="nav-icon">🤸</span>
      <span class="nav-label">Roster</span>
    </a>
    <a href="#" class="bottom-nav-item" data-view="leaderboards">
      <span class="nav-icon">📊</span>
      <span class="nav-label">Leaders</span>
    </a>
    <a href="#" class="bottom-nav-item" data-view="insights">
      <span class="nav-icon">🔍</span>
      <span class="nav-label">Insights</span>
    </a>
    <a href="#" class="bottom-nav-item refresh-mobile" id="refreshBtnMobile">
      <span class="nav-icon">🔄</span>
      <span class="nav-label">Refresh</span>
    </a>
  </nav>

  <!-- Toast Container -->
  <div id="toastContainer" class="toast-container"></div>

  <script src="js/search.js?v=0"></script>
  <script src="js/app.js?v=0"></script>
</body>
</html>
